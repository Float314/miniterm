name: Multi-Platform Build with vcpkg and OpenSSL

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: ${{ matrix.os }} Build
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: parallel

    - name: Install OpenSSL (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install openssl -y --no-progress
        # Set environment variable so CMake can find this specific OpenSSL installation if needed
        echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $GITHUB_ENV

    - name: Install OpenSSL (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev

    - name: Install OpenSSL (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install openssl@3
        # macOS homebrew doesn't link OpenSSL globally to avoid system conflicts, so we pass the path
        echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

    # GitHub Actions runners come with vcpkg pre-installed, but we need to point to it
    - name: Setup vcpkg Environment Variable
      shell: bash
      run: |
        echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

    # Optional but highly recommended: Cache vcpkg artifacts to make future builds fast
    - name: Restore vcpkg Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/vcpkg
          ${{ github.workspace }}/build/vcpkg_installed
          C:\User\runneradmin\AppData\Local\vcpkg\archives
        key: ${{ matrix.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ matrix.os }}-vcpkg-

    - name: Configure CMake
      run: |
        cmake --preset ${{ matrix.preset }}

    - name: Build Project
      run: |
        cmake --build --preset ${{ matrix.preset }}